<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>print.it</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2f3548;
      --text: #e8eaf0;
      --muted: #8b93a7;
      --accent: #5b8def;
      --accent-hover: #4a7de0;
      --ok: #3ecf8e;
      --err: #f07178;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--surface);
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .status {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .875rem;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
    }
    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--err); }
    main { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    nav {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .875rem;
    }
    nav button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: .35rem;
      margin-top: .75rem;
    }
    label:first-child { margin-top: 0; }
    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .6rem .75rem;
      border-radius: 8px;
      font-size: .9rem;
    }
    textarea { min-height: 120px; resize: vertical; font-family: inherit; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: .75rem;
    }
    .checks label {
      display: flex;
      align-items: center;
      gap: .4rem;
      margin: 0;
      color: var(--text);
      font-size: .875rem;
      cursor: pointer;
    }
    .checks input { width: auto; }
    button.btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: .65rem 1.25rem;
      border-radius: 8px;
      font-size: .9rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    button.btn:hover { background: var(--accent-hover); }
    button.btn:disabled { opacity: .5; cursor: not-allowed; }
    button.btn.secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .actions { display: flex; gap: .75rem; flex-wrap: wrap; }
    .printer-list { margin-top: 1rem; }
    .printer-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: .5rem;
      font-size: .875rem;
    }
    .printer-item.selected { border-color: var(--accent); }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: .75rem 1.25rem;
      border-radius: 8px;
      font-size: .875rem;
      max-width: 360px;
      z-index: 100;
      animation: fadeIn .2s ease;
    }
    .toast.ok { background: #1a3d2e; border: 1px solid var(--ok); color: var(--ok); }
    .toast.err { background: #3d1a1a; border: 1px solid var(--err); color: var(--err); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }
    .hint { font-size: .8rem; color: var(--muted); margin-top: .5rem; }
    .empty { color: var(--muted); font-size: .875rem; padding: .5rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>print<span>.it</span></h1>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Carregando...</span>
    </div>
  </header>

  <main>
    <nav id="tabs">
      <button data-tab="printer" class="active">Impressora</button>
      <button data-tab="text">Texto</button>
      <button data-tab="pdf">PDF</button>
      <button data-tab="barcode">Código de barras</button>
      <button data-tab="qrcode">QR Code</button>
      <button data-tab="image">Imagem</button>
    </nav>

    <!-- Impressora -->
    <section class="panel active" id="panel-printer">
      <div class="card">
        <h2>Impressora na rede</h2>
        <div class="actions">
          <button class="btn secondary" id="btnDiscover">Buscar na rede</button>
          <button class="btn secondary" id="btnTest">Imprimir teste</button>
        </div>
        <div class="printer-list" id="printerList">
          <p class="empty">Clique em "Buscar na rede" para encontrar impressoras (porta 9100).</p>
        </div>
      </div>
      <div class="card">
        <h2>Configuração manual</h2>
        <div class="row">
          <div>
            <label>IP da impressora</label>
            <input id="cfgHost" placeholder="192.168.1.79">
          </div>
          <div>
            <label>Porta</label>
            <input id="cfgPort" type="number" value="9100">
          </div>
        </div>
        <div class="row">
          <div>
            <label>Largura do papel (mm)</label>
            <select id="cfgPaper">
              <option value="80">80 mm</option>
              <option value="58">58 mm</option>
            </select>
          </div>
          <div>
            <label>Área imprimível (mm, 0 = auto)</label>
            <input id="cfgPrintable" type="number" min="0" max="80" placeholder="72">
          </div>
        </div>
        <div class="checks">
          <label><input type="checkbox" id="cfgTrim"> Recortar branco no fim (padrão)</label>
        </div>
        <button class="btn" id="btnSaveConfig">Salvar configuração</button>
      </div>
    </section>

    <!-- Texto -->
    <section class="panel" id="panel-text">
      <div class="card">
        <h2>Imprimir texto</h2>
        <label>Conteúdo</label>
        <textarea id="textContent" placeholder="Pedido #42&#10;Pizza Calabresa&#10;Total: R$ 45,00"></textarea>
        <div class="row">
          <div>
            <label>Alinhamento</label>
            <select id="textAlign">
              <option value="left">Esquerda</option>
              <option value="center">Centro</option>
              <option value="right">Direita</option>
            </select>
          </div>
        </div>
        <div class="checks">
          <label><input type="checkbox" id="textBold"> Negrito</label>
          <label><input type="checkbox" id="textCut" checked> Cortar no final</label>
          <label><input type="checkbox" id="textTrim"> Recortar linhas vazias no fim</label>
        </div>
        <button class="btn" id="btnPrintText">Imprimir</button>
      </div>
    </section>

    <!-- PDF -->
    <section class="panel" id="panel-pdf">
      <div class="card">
        <h2>Imprimir PDF</h2>
        <label>Arquivo PDF</label>
        <input type="file" id="pdfFile" accept="application/pdf,.pdf">
        <div class="checks">
          <label><input type="checkbox" id="pdfCut" checked> Cortar no final</label>
          <label><input type="checkbox" id="pdfCutBetween"> Meio corte entre páginas</label>
          <label><input type="checkbox" id="pdfTrim" checked> Recortar branco no fim</label>
        </div>
        <button class="btn" id="btnPrintPdf">Imprimir PDF</button>
      </div>
    </section>

    <!-- Barcode -->
    <section class="panel" id="panel-barcode">
      <div class="card">
        <h2>Código de barras</h2>
        <div class="row">
          <div>
            <label>Tipo</label>
            <select id="bcType">
              <option value="CODE128">CODE128</option>
              <option value="CODE39">CODE39</option>
              <option value="EAN13">EAN-13</option>
              <option value="EAN8">EAN-8</option>
              <option value="ITF">ITF</option>
            </select>
          </div>
          <div>
            <label>Alinhamento</label>
            <select id="bcAlign">
              <option value="center">Centro</option>
              <option value="left">Esquerda</option>
              <option value="right">Direita</option>
            </select>
          </div>
        </div>
        <label>Dados</label>
        <input id="bcData" placeholder="7891234567890">
        <label>Rótulo (opcional)</label>
        <input id="bcLabel" placeholder="Produto XYZ">
        <div class="checks">
          <label><input type="checkbox" id="bcCut" checked> Cortar no final</label>
        </div>
        <button class="btn" id="btnPrintBc">Imprimir código</button>
      </div>
    </section>

    <!-- QR -->
    <section class="panel" id="panel-qrcode">
      <div class="card">
        <h2>QR Code</h2>
        <label>Conteúdo (URL, texto, etc.)</label>
        <input id="qrData" placeholder="https://exemplo.com/pedido/42">
        <label>Rótulo (opcional)</label>
        <input id="qrLabel" placeholder="Escaneie para pagar">
        <div class="row">
          <div>
            <label>Alinhamento</label>
            <select id="qrAlign">
              <option value="center">Centro</option>
              <option value="left">Esquerda</option>
              <option value="right">Direita</option>
            </select>
          </div>
        </div>
        <div class="checks">
          <label><input type="checkbox" id="qrCut" checked> Cortar no final</label>
        </div>
        <button class="btn" id="btnPrintQr">Imprimir QR Code</button>
      </div>
    </section>

    <!-- Imagem -->
    <section class="panel" id="panel-image">
      <div class="card">
        <h2>Imprimir imagem</h2>
        <label>PNG ou JPG</label>
        <input type="file" id="imgFile" accept="image/png,image/jpeg,image/jpg">
        <div class="checks">
          <label><input type="checkbox" id="imgCut" checked> Cortar no final</label>
          <label><input type="checkbox" id="imgTrim"> Recortar branco no fim</label>
        </div>
        <button class="btn" id="btnPrintImg">Imprimir imagem</button>
      </div>
    </section>
  </main>

  <script>
    const $ = (s) => document.querySelector(s);
    const api = (path, opts = {}) => fetch(path, opts);

    function toast(msg, ok = true) {
      const el = document.createElement("div");
      el.className = "toast " + (ok ? "ok" : "err");
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    async function loadHealth() {
      try {
        const r = await api("/health");
        const d = await r.json();
        $("#statusDot").className = "dot ok";
        $("#statusText").textContent = d.printer || "Conectado";
      } catch {
        $("#statusDot").className = "dot err";
        $("#statusText").textContent = "Serviço offline";
      }
    }

    async function loadConfig() {
      const r = await api("/config");
      const c = await r.json();
      $("#cfgHost").value = c.printer_host || "";
      $("#cfgPort").value = c.printer_port || 9100;
      $("#cfgPaper").value = String(c.paper_width_mm || 80);
      $("#cfgPrintable").value = c.printable_width_mm || "";
      $("#cfgTrim").checked = !!c.trim_trailing_blank;
      $("#pdfTrim").checked = !!c.trim_trailing_blank;
      $("#textTrim").checked = !!c.trim_trailing_blank;
    }

    document.querySelectorAll("#tabs button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#tabs button").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        $("#panel-" + btn.dataset.tab).classList.add("active");
      });
    });

    $("#btnSaveConfig").addEventListener("click", async () => {
      const body = {
        printer_host: $("#cfgHost").value.trim(),
        printer_port: parseInt($("#cfgPort").value, 10) || 9100,
        paper_width_mm: parseInt($("#cfgPaper").value, 10),
        printable_width_mm: parseInt($("#cfgPrintable").value, 10) || 0,
        trim_trailing_blank: $("#cfgTrim").checked,
      };
      const r = await api("/config", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (!r.ok) return toast(d.error || "Erro ao salvar", false);
      toast("Configuração salva");
      loadHealth();
    });

    $("#btnDiscover").addEventListener("click", async () => {
      const btn = $("#btnDiscover");
      btn.disabled = true;
      btn.textContent = "Buscando...";
      $("#printerList").innerHTML = '<p class="empty">Varredura em andamento (pode levar ~10s)...</p>';
      try {
        const r = await api("/discover");
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        if (!d.printers || d.printers.length === 0) {
          $("#printerList").innerHTML = '<p class="empty">Nenhuma impressora encontrada na porta 9100.</p>';
          return;
        }
        $("#printerList").innerHTML = d.printers.map((p) => `
          <div class="printer-item${p.configured ? " selected" : ""}">
            <span>${p.host}:${p.port}</span>
            <button class="btn secondary" data-host="${p.host}" data-port="${p.port}">Usar</button>
          </div>
        `).join("");
        $("#printerList").querySelectorAll("button").forEach((b) => {
          b.addEventListener("click", async () => {
            const r = await api("/discover/apply", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ host: b.dataset.host, port: parseInt(b.dataset.port, 10) }),
            });
            const d = await r.json();
            if (!r.ok) return toast(d.error || "Erro", false);
            toast("Impressora selecionada: " + b.dataset.host);
            loadConfig();
            loadHealth();
          });
        });
        toast(`${d.count} impressora(s) em ${d.duration}`);
      } catch (e) {
        toast(e.message || "Erro na busca", false);
        $("#printerList").innerHTML = '<p class="empty">Falha na busca.</p>';
      } finally {
        btn.disabled = false;
        btn.textContent = "Buscar na rede";
      }
    });

    $("#btnTest").addEventListener("click", async () => {
      const r = await api("/print/test", { method: "POST" });
      const d = await r.json();
      if (!r.ok) return toast(d.error || "Erro", false);
      toast(d.message || "Teste enviado");
    });

    $("#btnPrintText").addEventListener("click", async () => {
      const r = await api("/print", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          text: $("#textContent").value,
          align: $("#textAlign").value,
          bold: $("#textBold").checked,
          cut: $("#textCut").checked,
          trim_trailing_blank: $("#textTrim").checked,
        }),
      });
      const d = await r.json();
      if (!r.ok) return toast(d.error || "Erro", false);
      toast("Texto enviado");
    });

    $("#btnPrintPdf").addEventListener("click", async () => {
      const file = $("#pdfFile").files[0];
      if (!file) return toast("Selecione um PDF", false);
      const fd = new FormData();
      fd.append("file", file);
      fd.append("cut", $("#pdfCut").checked);
      fd.append("cut_between_pages", $("#pdfCutBetween").checked);
      fd.append("trim_trailing_blank", $("#pdfTrim").checked);
      const r = await api("/print/pdf", { method: "POST", body: fd });
      const d = await r.json();
      if (!r.ok) return toast(d.error || "Erro", false);
      toast("PDF enviado");
    });

    $("#btnPrintBc").addEventListener("click", async () => {
      const r = await api("/print/barcode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          type: $("#bcType").value,
          data: $("#bcData").value.trim(),
          label: $("#bcLabel").value.trim(),
          align: $("#bcAlign").value,
          cut: $("#bcCut").checked,
        }),
      });
      const d = await r.json();
      if (!r.ok) return toast(d.error || "Erro", false);
      toast("Código de barras enviado");
    });

    $("#btnPrintQr").addEventListener("click", async () => {
      const r = await api("/print/qrcode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          data: $("#qrData").value.trim(),
          label: $("#qrLabel").value.trim(),
          align: $("#qrAlign").value,
          cut: $("#qrCut").checked,
        }),
      });
      const d = await r.json();
      if (!r.ok) return toast(d.error || "Erro", false);
      toast("QR Code enviado");
    });

    $("#btnPrintImg").addEventListener("click", async () => {
      const file = $("#imgFile").files[0];
      if (!file) return toast("Selecione uma imagem", false);
      const fd = new FormData();
      fd.append("file", file);
      fd.append("cut", $("#imgCut").checked);
      fd.append("trim_trailing_blank", $("#imgTrim").checked);
      const r = await api("/print/image", { method: "POST", body: fd });
      const d = await r.json();
      if (!r.ok) return toast(d.error || "Erro", false);
      toast("Imagem enviada");
    });

    loadHealth();
    loadConfig();
    setInterval(loadHealth, 15000);
  </script>
</body>
</html>
