<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="author" content="IdeYou - Isaque Costa">
  <meta name="description" content="print.it — agente local de impressão térmica.">
  <meta name="theme-color" content="#FF5456">
  <title>print.it</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
  <div class="cube-bg" aria-hidden="true">
    <div class="cube-green"></div>
    <div class="cube-red"></div>
    <div class="cube-yellow"></div>
  </div>

  <header class="userbar">
    <div class="userbar-left">
      <img class="logo" src="assets/imgs/logos/logo-dark.svg" alt="IdeYou — print.it">
      <nav class="tabs" id="tabs">
        <button type="button" data-tab="printer" class="active">Impressora</button>
        <button type="button" data-tab="text">Texto</button>
        <button type="button" data-tab="pdf">PDF</button>
        <button type="button" data-tab="barcode">Código de barras</button>
        <button type="button" data-tab="qrcode">QR Code</button>
        <button type="button" data-tab="image">Imagem</button>
      </nav>
    </div>
    <div class="userbar-right">
      <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Carregando...</span>
      </div>
    </div>
  </header>

  <main>
    <section class="panel active" id="panel-printer">
      <div class="card">
        <h2>Impressora na rede</h2>
        <div class="actions">
          <button type="button" class="btn secondary" id="btnDiscover">Buscar na rede</button>
          <button type="button" class="btn secondary" id="btnDiscoverDeep">Varredura completa</button>
          <button type="button" class="btn secondary" id="btnTest">Imprimir teste</button>
        </div>
        <div class="printer-list" id="printerList">
          <p class="empty">Clique em &quot;Buscar na rede&quot; para encontrar impressoras (porta 9100).</p>
        </div>
      </div>
      <div class="card">
        <h2>Configuração manual</h2>
        <div class="row">
          <div>
            <label for="cfgHost">IP da impressora</label>
            <input id="cfgHost" type="text" placeholder="192.168.1.79">
          </div>
          <div>
            <label for="cfgPort">Porta</label>
            <input id="cfgPort" type="number" value="9100">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="cfgPaper">Largura do papel (mm)</label>
            <select id="cfgPaper">
              <option value="80">80 mm</option>
              <option value="58">58 mm</option>
            </select>
          </div>
          <div>
            <label for="cfgPrintable">Área imprimível (mm, 0 = auto)</label>
            <input id="cfgPrintable" type="number" min="0" max="80" placeholder="72">
          </div>
        </div>
        <div class="checks">
          <label><input type="checkbox" id="cfgTrim"> Recortar branco no fim (padrão)</label>
        </div>
        <button type="button" class="btn" id="btnSaveConfig">Salvar configuração</button>
      </div>
    </section>

    <section class="panel" id="panel-text">
      <div class="card">
        <h2>Imprimir texto</h2>
        <label for="textContent">Conteúdo</label>
        <textarea id="textContent" placeholder="Pedido #42&#10;Pizza Calabresa&#10;Total: R$ 45,00"></textarea>
        <div class="row">
          <div>
            <label for="textAlign">Alinhamento</label>
            <select id="textAlign">
              <option value="left">Esquerda</option>
              <option value="center">Centro</option>
              <option value="right">Direita</option>
            </select>
          </div>
        </div>
        <div class="checks">
          <label><input type="checkbox" id="textBold"> Negrito</label>
          <label><input type="checkbox" id="textCut" checked> Cortar no final</label>
          <label><input type="checkbox" id="textTrim"> Recortar linhas vazias no fim</label>
        </div>
        <button type="button" class="btn" id="btnPrintText">Imprimir</button>
      </div>
    </section>

    <section class="panel" id="panel-pdf">
      <div class="card">
        <h2>Imprimir PDF</h2>
        <label for="pdfFile">Arquivo PDF</label>
        <input id="pdfFile" type="file" accept="application/pdf,.pdf">
        <div class="checks">
          <label><input type="checkbox" id="pdfCut" checked> Cortar no final</label>
          <label><input type="checkbox" id="pdfCutBetween"> Meio corte entre páginas</label>
          <label><input type="checkbox" id="pdfTrim" checked> Recortar branco no fim</label>
        </div>
        <button type="button" class="btn" id="btnPrintPdf">Imprimir PDF</button>
      </div>
    </section>

    <section class="panel" id="panel-barcode">
      <div class="card">
        <h2>Código de barras</h2>
        <div class="row">
          <div>
            <label for="bcType">Tipo</label>
            <select id="bcType">
              <option value="CODE128">CODE128</option>
              <option value="CODE39">CODE39</option>
              <option value="EAN13">EAN-13</option>
              <option value="EAN8">EAN-8</option>
              <option value="ITF">ITF</option>
            </select>
          </div>
          <div>
            <label for="bcAlign">Alinhamento</label>
            <select id="bcAlign">
              <option value="center">Centro</option>
              <option value="left">Esquerda</option>
              <option value="right">Direita</option>
            </select>
          </div>
        </div>
        <label for="bcData">Dados</label>
        <input id="bcData" type="text" placeholder="7891234567890">
        <label for="bcLabel">Rótulo (opcional)</label>
        <input id="bcLabel" type="text" placeholder="Produto XYZ">
        <div class="checks">
          <label><input type="checkbox" id="bcCut" checked> Cortar no final</label>
        </div>
        <button type="button" class="btn" id="btnPrintBc">Imprimir código</button>
      </div>
    </section>

    <section class="panel" id="panel-qrcode">
      <div class="card">
        <h2>QR Code</h2>
        <label for="qrData">Conteúdo (URL, texto, etc.)</label>
        <input id="qrData" type="text" placeholder="https://exemplo.com/pedido/42">
        <label for="qrLabel">Rótulo (opcional)</label>
        <input id="qrLabel" type="text" placeholder="Escaneie para pagar">
        <div class="row">
          <div>
            <label for="qrAlign">Alinhamento</label>
            <select id="qrAlign">
              <option value="center">Centro</option>
              <option value="left">Esquerda</option>
              <option value="right">Direita</option>
            </select>
          </div>
        </div>
        <div class="checks">
          <label><input type="checkbox" id="qrCut" checked> Cortar no final</label>
        </div>
        <button type="button" class="btn" id="btnPrintQr">Imprimir QR Code</button>
      </div>
    </section>

    <section class="panel" id="panel-image">
      <div class="card">
        <h2>Imprimir imagem</h2>
        <label for="imgFile">PNG ou JPG</label>
        <input id="imgFile" type="file" accept="image/png,image/jpeg,image/jpg">
        <div class="checks">
          <label><input type="checkbox" id="imgCut" checked> Cortar no final</label>
          <label><input type="checkbox" id="imgTrim"> Recortar branco no fim</label>
        </div>
        <button type="button" class="btn" id="btnPrintImg">Imprimir imagem</button>
      </div>
    </section>
  </main>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
