name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (ex. v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    # Binario Linux linkado contra glibc do Ubuntu 20.04 (2.31+): roda em 20.04/22.04/24.04, Debian 11+ etc.
    container:
      image: ubuntu:20.04
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            ldflags: "-s -w"
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bash ca-certificates git build-essential
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          set -euo pipefail
          go mod tidy
          mkdir -p dist
          eval "$(packaging/read-build-config.sh export)"
          if [ -z "${PRINT_IT_BARCODES_API_KEY:-}" ]; then
            echo "barcodes_api_key ausente em packaging/build.config.json" >&2
            exit 1
          fi
          go build -ldflags "${{ matrix.ldflags }} ${PRINT_IT_LDFLAGS_BUILD}" -o "dist/print.it-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .
          strings "dist/print.it-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" | grep -qF "${PRINT_IT_BARCODES_API_KEY}"
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/print.it-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  package-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build pkg
        env:
          CGO_ENABLED: 1
          PRINT_IT_PKG_ARCH: arm64
        run: |
          chmod +x packaging/macos/build-pkg.sh
          packaging/macos/build-pkg.sh
          ls -lh dist/*.pkg
      - uses: actions/upload-artifact@v7
        with:
          name: installer-macos-arm64
          path: dist/print.it-*-macos-arm64.pkg

  package-macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build pkg
        env:
          CGO_ENABLED: 1
          PRINT_IT_PKG_ARCH: amd64
        run: |
          chmod +x packaging/macos/build-pkg.sh
          packaging/macos/build-pkg.sh
          ls -lh dist/*.pkg
      - uses: actions/upload-artifact@v7
        with:
          name: installer-macos-amd64
          path: dist/print.it-*-macos-amd64.pkg

  package-linux:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          name: binary-linux-amd64
          path: dist
      - name: Build deb
        run: |
          chmod +x packaging/linux/build-deb.sh
          packaging/linux/build-deb.sh
          ls -lh dist/*.deb
      - uses: actions/upload-artifact@v7
        with:
          name: installer-linux-amd64
          path: dist/print.it-*-linux-amd64.deb

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Build native Windows binary (CGO + MuPDF estatico)
        shell: bash
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: |
          set -euo pipefail
          gcc --version
          go mod tidy
          mkdir -p dist
          eval "$(packaging/read-build-config.sh export)"
          if [ -z "${PRINT_IT_BARCODES_API_KEY:-}" ]; then
            echo "barcodes_api_key ausente em packaging/build.config.json" >&2
            exit 1
          fi
          chmod +x packaging/embed-windows-icon.sh
          packaging/embed-windows-icon.sh
          go build -ldflags "-s -w -H=windowsgui ${PRINT_IT_LDFLAGS_BUILD}" -o dist/print.it-windows-amd64.exe .
          go version
          strings dist/print.it-windows-amd64.exe | grep -qF "${PRINT_IT_BARCODES_API_KEY}"
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/Inno Setup 6:$PATH"
          test -f dist/print.it-windows-amd64.exe
          python -m pip install --quiet pillow
          chmod +x packaging/windows/build-msi.sh
          packaging/windows/build-msi.sh
          ls -lh dist/*.exe
      - uses: actions/upload-artifact@v7
        with:
          name: installer-windows-amd64
          path: dist/print.it-*-windows-amd64.exe

  release:
    needs:
      - build-binaries
      - package-macos-arm64
      - package-macos-amd64
      - package-linux
      - package-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Prepare release assets
        run: |
          mkdir -p dist
          shopt -s nullglob
          for pattern in \
            "release-assets/print.it-*-macos-arm64.pkg" \
            "release-assets/print.it-*-macos-amd64.pkg" \
            "release-assets/print.it-*-linux-amd64.deb" \
            "release-assets/print.it-*-windows-amd64.exe"
          do
            for file in $pattern; do
              cp -v "$file" dist/
            done
          done
          ls -lh dist
          for pattern in \
            "print.it-*-macos-arm64.pkg" \
            "print.it-*-macos-amd64.pkg" \
            "print.it-*-linux-amd64.deb" \
            "print.it-*-windows-amd64.exe"
          do
            matches=(dist/$pattern)
            if [ ! -e "${matches[0]}" ]; then
              echo "Artefato ausente: $pattern" >&2
              exit 1
            fi
          done
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            dist/print.it-*-macos-arm64.pkg
            dist/print.it-*-macos-amd64.pkg
            dist/print.it-*-linux-amd64.deb
            dist/print.it-*-windows-amd64.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
