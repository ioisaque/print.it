name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (ex. v0.3.0)
        required: true
        default: v0.3.0

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go mod tidy
          mkdir -p dist
          go build -ldflags "-s -w" -o "dist/print.it-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .
      - uses: actions/upload-artifact@v5
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/print.it-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  package-macos-arm64:
    needs: build-binaries
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          name: binary-darwin-arm64
          path: dist
      - name: Build pkg
        env:
          PRINT_IT_PKG_ARCH: arm64
        run: |
          chmod +x packaging/macos/build-pkg.sh
          packaging/macos/build-pkg.sh
          ls -lh dist/*.pkg
      - uses: actions/upload-artifact@v5
        with:
          name: installer-macos-arm64
          path: dist/print.it-*-macos-arm64.pkg

  package-macos-amd64:
    needs: build-binaries
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          name: binary-darwin-amd64
          path: dist
      - name: Build pkg
        env:
          PRINT_IT_PKG_ARCH: amd64
        run: |
          chmod +x packaging/macos/build-pkg.sh
          packaging/macos/build-pkg.sh
          ls -lh dist/*.pkg
      - uses: actions/upload-artifact@v5
        with:
          name: installer-macos-amd64
          path: dist/print.it-*-macos-amd64.pkg

  package-linux:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          name: binary-linux-amd64
          path: dist
      - name: Build deb
        run: |
          chmod +x packaging/linux/build-deb.sh
          packaging/linux/build-deb.sh
          ls -lh dist/*.deb
      - uses: actions/upload-artifact@v5
        with:
          name: installer-linux-amd64
          path: dist/print.it-*-linux-amd64.deb

  package-windows:
    needs: build-binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          name: binary-windows-amd64
          path: dist
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/Inno Setup 6:$PATH"
          test -f dist/print.it-windows-amd64.exe
          chmod +x packaging/windows/build-msi.sh
          packaging/windows/build-msi.sh
          ls -lh dist/*.exe
      - uses: actions/upload-artifact@v5
        with:
          name: installer-windows-amd64
          path: dist/print.it-*-windows-amd64.exe

  release:
    needs:
      - package-macos-arm64
      - package-macos-amd64
      - package-linux
      - package-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true
      - name: Prepare release assets
        run: |
          mkdir -p dist
          shopt -s nullglob
          for pattern in \
            "release-assets/print.it-*-macos-arm64.pkg" \
            "release-assets/print.it-*-macos-amd64.pkg" \
            "release-assets/print.it-*-linux-amd64.deb" \
            "release-assets/print.it-*-windows-amd64.exe"
          do
            for file in $pattern; do
              cp -v "$file" dist/
            done
          done
          ls -lh dist
          for pattern in \
            "print.it-*-macos-arm64.pkg" \
            "print.it-*-macos-amd64.pkg" \
            "print.it-*-linux-amd64.deb" \
            "print.it-*-windows-amd64.exe"
          do
            matches=(dist/$pattern)
            if [ ! -e "${matches[0]}" ]; then
              echo "Artefato ausente: $pattern" >&2
              exit 1
            fi
          done
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            dist/print.it-*-macos-arm64.pkg
            dist/print.it-*-macos-amd64.pkg
            dist/print.it-*-linux-amd64.deb
            dist/print.it-*-windows-amd64.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
